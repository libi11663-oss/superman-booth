<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>超人電話亭系統 v47</title>
    <style>
        :root { --red: #d0021b; --yellow: #ffcc00; --white: #ffffff; }
        
        body { 
            background-color: #fffaf0;
            background-image: radial-gradient(#d0021b1a 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: "Rounded Mplus 1c", "Yu Gothic", "PingFang TC", "微軟正黑體", cursive; 
            margin: 0; padding: 0; 
        }

        .app-container { width: 100%; min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: var(--red); padding: 40px 20px; text-align: center; border-bottom: 8px solid var(--yellow); overflow: hidden; }
        .header img { max-width: 80%; height: auto; filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.2)); }
        
        /* 標題與竹子容器 */
        .sub-text-wrapper {
            position: relative;
            display: inline-block;
            margin-top: 15px;
        }

        .sub-text { 
            font-size: 18px; 
            color: var(--white); 
            font-weight: bold; 
            letter-spacing: 2px;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--yellow);
            animation: neon-blink 2s infinite ease-in-out;
            position: relative;
            z-index: 2;
        }

        /* 旋轉小竹子樣式 */
        .bamboo-orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 1px;
            height: 1px;
            animation: rotate-bamboo 4s linear infinite;
            z-index: 3;
        }

        .bamboo-icon {
            position: absolute;
            font-size: 24px;
            top: -12px;
            left: 140px; /* 控制竹子繞圈的半徑，若文字太長可以調大 */
        }

        @keyframes rotate-bamboo {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes neon-blink {
            0%, 100% { opacity: 1; text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--yellow); }
            50% { opacity: 0.8; text-shadow: 0 0 2px #fff, 0 0 5px var(--yellow); }
        }

        .search-box { 
            padding: 30px 20px; 
            text-align: center; 
            background: rgba(255,255,255,0.85); 
            backdrop-filter: blur(5px); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }

        input { 
            width: 100%; padding: 22px; border: 4px solid #ff8d8d; border-radius: 30px;
            font-size: 24px; box-sizing: border-box; outline: none; text-align: center; font-weight: bold; background: #fff9f9;
        }

        .btn { 
            width: 100%; background: var(--yellow); color: var(--red); border: none; padding: 22px; border-radius: 30px;
            font-size: 26px; font-weight: 900; margin-top: 15px; cursor: pointer; box-shadow: 0 8px 0px #e6b800; transition: 0.1s;
        }

        .btn:active { transform: translateY(6px); box-shadow: 0 2px 0px #e6b800; }
        
        #resultArea { padding: 20px; flex-grow: 1; }
        
        .result-item { 
            background: white; border: 3px solid #ffebeb; border-left: 15px solid var(--red); border-radius: 25px;
            padding: 20px; margin-bottom: 20px; display: flex; flex-direction: column; 
            box-shadow: 0 10px 0px rgba(0,0,0,0.03); animation: slideIn 0.3s ease-out;
            position: relative; transition: 0.3s;
            cursor: pointer;
        }

        .result-main { display: flex; align-items: center; justify-content: space-between; width: 100%; }

        @keyframes slideIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .res-info { flex-grow: 1; }
        .res-name { font-size: 22px; font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
        .res-loc { font-size: 28px; font-weight: 900; color: var(--red); background: #fff5f5; padding: 5px 15px; border-radius: 15px; display: inline-block; border: 1px solid #ffdfdf; }
        .res-loc::before { content: "📍"; margin-right: 5px; font-size: 20px; }

        .delete-btn {
            background: #ff4d4d; color: white; border: none; width: 45px; height: 45px;
            border-radius: 50%; font-size: 24px; font-weight: bold; cursor: pointer;
            margin-left: 15px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 0px #cc0000; flex-shrink: 0;
        }

        .result-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 20px rgba(208, 2, 27, 0.1);
            background: linear-gradient(145deg, #ffffff, #fff5f5);
        }

        .no-result { color: #d0021b; text-align: center; padding: 30px; background: #fff1f1; border-radius: 25px; font-size: 18px; font-weight: bold; border: 2px dashed #ffb3b3; }

        .removing {
            background-color: #e6ffec !important; 
            border-color: #cfffda !important;
            border-left-color: #34d399 !important;
            transform: scale(0.5);
            opacity: 0;
            transition: 0.3s ease-in;
        }

        .res-img {
            width: 100%;
            max-height: 350px;
            object-fit: contain;
            margin-top: 15px;
            display: none;
            border-radius: 15px;
            border: 2px solid #eee;
            background: #fff;
        }

        .result-item.active .res-img {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

    function search() {
        const inputStr = document.getElementById('sku').value.trim();
        const resultArea = document.getElementById('resultArea');
        if (!inputStr) return;
        
        const keywords = inputStr.split(/[#、，, \n\t]+/).map(s => s.trim().toLowerCase()).filter(s => s !== "");
        resultArea.innerHTML = ""; 
        
        keywords.forEach(keyword => {
            const matches = database.filter(item => {
                const nameMatch = item.key.some(k => k.toLowerCase().includes(keyword));
                const locMatch = item.loc.toLowerCase().includes(keyword);
                return nameMatch || locMatch;
            });
            
            if (matches.length > 0) {
                matches.forEach(res => {
                    const div = document.createElement('div');
                    div.className = "result-item";
                    
                    div.onclick = function() {
                        this.classList.toggle('active');
                        if (navigator.vibrate) { navigator.vibrate(10); } 
                    };

                    div.innerHTML = `
                        <div class="result-main">
                            <div class="res-info">
                                <span class="res-name">📦 ${res.name}</span>
                                <span class="res-loc">${res.loc}</span>
                            </div>
                            <button class="delete-btn" onclick="event.stopPropagation(); removeItem(this)">×</button>
                        </div>
                        ${res.img ? `<img src="${res.img}" class="res-img" loading="lazy">` : ''}
                    `;
                    resultArea.appendChild(div);
                });
            } else {
                const div = document.createElement('div');
                div.className = "no-result";
                div.innerText = `找不到「${keyword}」啦 (´•̥ ᵔ •̥ \`)`;
                resultArea.appendChild(div);
            }
        });
        document.activeElement.blur();
    }

    function removeItem(btn) {
        const item = btn.closest('.result-item');
        item.classList.add('removing');
        setTimeout(() => { item.remove(); }, 300);
    }

    document.getElementById('sku').addEventListener('keypress', e => { 
        if (e.key === 'Enter') search(); 
    });
